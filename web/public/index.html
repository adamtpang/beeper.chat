<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>beeper.chat — daily triage</title>
<link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;📥&lt;/text&gt;&lt;/svg&gt;" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  @font-face{font-family:'Haskoy';font-weight:400 800;font-display:swap;src:url('https://cdn.jsdelivr.net/npm/@fontsource/haskoy/files/haskoy-latin-500-normal.woff2') format('woff2')}
  :root{
    --bg:#F8F8F8;--card:#FFFFFF;--ink:#1E1E1E;--muted:#5F6368;--faint:#9AA0A6;
    --line:#E6E6EE;--brand:#6A4BE5;--brand-light:#9E7EF8;--grad:linear-gradient(180deg,#9E7EF8,#6A4BE5);
    --blue:#0D4FFB;--dark:#1F1E22;--ok:#1f9d57;
    --font:"Haskoy","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .brand{font-weight:800;font-size:20px;letter-spacing:-.02em;display:flex;align-items:center;gap:9px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--grad)}
  .btn{font-weight:700;font-size:13px;border:0;border-radius:999px;padding:11px 18px;cursor:pointer;background:var(--grad);color:#fff;letter-spacing:.02em}
  .btn:hover{filter:brightness(1.05)} .btn:disabled{opacity:.6;cursor:default}
  .sub{color:var(--muted);font-size:14px;margin:2px 0 18px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:rgba(106,75,229,.1);color:var(--brand);margin-left:8px}
  .summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--muted)}
  .pill b{color:var(--ink);font-size:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 0 rgba(31,30,34,.02)}
  .card.top{border-color:rgba(106,75,229,.35);box-shadow:0 14px 30px -22px rgba(106,75,229,.6)}
  .row1{display:flex;align-items:center;gap:10px}
  .score{font-weight:800;font-size:13px;color:#fff;background:var(--brand);border-radius:8px;padding:4px 9px;flex:none}
  .score.noise{background:#C9C9D3}
  .who{font-weight:700;font-size:16px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .net{font-size:12px;color:var(--faint)}
  .tag{font-size:10px;font-weight:800;letter-spacing:.06em;padding:3px 7px;border-radius:6px;background:rgba(13,79,251,.1);color:var(--blue)}
  .tag.noise{background:#EEE;color:var(--faint)} .tag.task{background:rgba(106,75,229,.12);color:var(--brand)}
  .ix{font-size:11px;color:var(--faint);margin-left:2px}
  .body{color:var(--ink);font-size:14.5px;margin:10px 0 0}
  .next{color:var(--muted);font-size:13px;margin-top:8px}
  .next b{color:var(--ink)}
  .draft{margin-top:10px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;color:#33323a;white-space:pre-wrap}
  .acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .act{font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;cursor:pointer;color:var(--ink)}
  .act:hover{border-color:var(--brand);color:var(--brand)}
  .act.done{background:var(--ok);color:#fff;border-color:var(--ok)}
  .state{color:var(--muted);font-size:14px;padding:40px 0;text-align:center}
  .demoflag{font-size:11px;font-weight:700;color:#9a6b00;background:#fff3d6;border:1px solid #ffe2a8;border-radius:999px;padding:4px 10px}
  .err{background:#fff0ef;border:1px solid #ffcfca;color:#9b2c22;border-radius:12px;padding:14px;font-size:14px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span>beeper.chat <span id="flag"></span></div>
    <button class="btn" id="run" onclick="run()">Run triage</button>
  </header>
  <div class="sub">Your inbox, ranked by importance × urgency. Drafts never send on their own.</div>
  <div class="summary" id="summary"></div>
  <div id="list"><div class="state">Click “Run triage” to load your ranked inbox.</div></div>
</div>
<script>
  const $ = (s) => document.querySelector(s);
  const esc = (t) => (t || '').replace(/[&<>]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  async function run(){
    const btn = $('#run'); btn.disabled = true; btn.textContent = 'Triaging…';
    $('#list').innerHTML = '<div class="state">Reading your inbox and ranking it…</div>';
    try{
      const res = await fetch('/api/inbox'); const data = await res.json();
      if(data.error) throw new Error(data.error);
      render(data);
    }catch(e){
      $('#list').innerHTML = '<div class="err">'+esc(String(e.message||e))+'</div>';
      $('#summary').innerHTML = '';
    }
    btn.disabled = false; btn.textContent = 'Refresh';
  }

  function render(data){
    const items = data.items || [];
    $('#flag').innerHTML = data.demo ? '<span class="demoflag">demo data</span>' : '';
    const reply = items.filter(i=>/REPLY/.test(i.type)).length;
    const task = items.filter(i=>/TASK/.test(i.type)).length;
    const noise = items.filter(i=>i.type==='NOISE').length;
    $('#summary').innerHTML =
      pill(items.length,'chats') + pill(reply,'to reply') + pill(task,'tasks') + pill(noise,'noise');
    $('#list').innerHTML = items.map((it,idx)=>card(it,idx)).join('') || '<div class="state">Inbox zero. Nothing to triage.</div>';
  }
  const pill = (n,l) => '<div class="pill"><b>'+n+'</b> '+l+'</div>';

  function card(it, idx){
    const noise = it.type === 'NOISE';
    const tagClass = noise ? 'noise' : (/TASK/.test(it.type) && !/REPLY/.test(it.type) ? 'task' : '');
    return '<div class="card '+(idx===0&&!noise?'top':'')+'">'
      + '<div class="row1">'
      +   '<span class="score '+(noise?'noise':'')+'">'+(it.score??'')+'</span>'
      +   '<span class="who">'+esc(it.who)+' <span class="net">· '+esc(it.network)+'</span></span>'
      +   '<span class="tag '+tagClass+'">'+esc(it.type)+'</span>'
      + '</div>'
      + '<div class="ix">importance '+(it.importance??'?')+' × urgency '+(it.urgency??'?')+'</div>'
      + '<div class="body">'+esc(it.summary)+'</div>'
      + (it.nextStep ? '<div class="next"><b>Next:</b> '+esc(it.nextStep)+'</div>' : '')
      + (it.draft ? '<div class="draft" id="d'+idx+'">'+esc(it.draft)+'</div>' : '')
      + '<div class="acts">'
      +   (it.draft ? '<button class="act" onclick="copyDraft('+idx+',this)">Copy draft</button>' : '')
      +   '<button class="act" onclick="doAct(\''+it.chatId+'\',\'archive\',this)">Archive</button>'
      +   '<button class="act" onclick="this.classList.toggle(\'done\')">Done</button>'
      + '</div>'
      + '</div>';
  }

  function copyDraft(i, btn){
    const t = $('#d'+i).innerText; if(navigator.clipboard) navigator.clipboard.writeText(t);
    btn.classList.add('done'); btn.textContent='Copied'; setTimeout(()=>{btn.classList.remove('done');btn.textContent='Copy draft';},1500);
  }
  async function doAct(chatId, action, btn){
    btn.disabled = true;
    try{ await fetch('/api/act',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({action,chatId})});
      btn.classList.add('done'); btn.textContent = action==='archive'?'Archived':'Done';
    }catch(e){ btn.textContent='Failed'; }
  }
</script>
</body>
</html>
